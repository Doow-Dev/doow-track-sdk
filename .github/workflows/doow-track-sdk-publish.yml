name: doow-track — Test, Build, Publish

on:
  push:
    tags:
      - 'sdk/v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GHCR_LOGIN_SERVER: ghcr.io
  GHCR_IMAGE_NAME: doow-dev/doow-track-sidecar
defaults:
  run:
    working-directory: .

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18.x', '20.x', '22.x']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/sdk/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20 (npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    name: Publish sidecar Docker image
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/sdk/v')

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/sdk/v}"
          MAJOR="${VERSION%%.*}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_LOGIN_SERVER }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push sidecar image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GHCR_LOGIN_SERVER }}/${{ env.GHCR_IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.GHCR_LOGIN_SERVER }}/${{ env.GHCR_IMAGE_NAME }}:${{ steps.version.outputs.major }}
            ${{ env.GHCR_LOGIN_SERVER }}/${{ env.GHCR_IMAGE_NAME }}:latest
          build-args: |
            SDK_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: GitHub Release with CLI binaries
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/sdk/v')

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-latest
            target: linux-arm64
          - os: macos-latest
            target: darwin-x64
          - os: macos-latest
            target: darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/sdk/v}" >> "$GITHUB_OUTPUT"

      - name: Package CLI binary
        run: |
          BINARY_NAME="doow-track-${{ matrix.target }}"
          cp dist/cli.cjs "${BINARY_NAME}"
          chmod +x "${BINARY_NAME}"
          sha256sum "${BINARY_NAME}" > "${BINARY_NAME}.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "@doow/track v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            doow-track-${{ matrix.target }}
            doow-track-${{ matrix.target }}.sha256
